name: build
on: [push, pull_request]
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        java-version: [23]
    runs-on: ${{matrix.os}}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download custom JDK artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download 23775198979 \
            --repo cdsap/im-not-ok-metrics \
            --name custom-jdk-linux-im-not-okay \
            --dir "$GITHUB_WORKSPACE/custom-jdk"

      - name: Unpack and activate custom JDK
        run: |
          mkdir -p "$GITHUB_WORKSPACE/custom-jdk/unpacked"
          tar -xzf "$GITHUB_WORKSPACE/custom-jdk/custom-jdk-linux-im-not-okay.tar.gz" \
            -C "$GITHUB_WORKSPACE/custom-jdk/unpacked"

          echo "JAVA_HOME=$GITHUB_WORKSPACE/custom-jdk/unpacked/jdk" >> "$GITHUB_ENV"
          echo "$GITHUB_WORKSPACE/custom-jdk/unpacked/jdk/bin" >> "$GITHUB_PATH"

      - name: Verify Java
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          java -XX:+UnlockExperimentalVMOptions -XX:+UseImNotOkayGC -version

          
      - name: Build Process Watcher
        uses: cdsap/build-process-watcher@v0.6.0
        with:
          remote_monitoring: 'true'
      - name: Test Android Library
        run: ./gradlew assembleDebug
        env:
          DEVELOCITY_ACCESS_KEY: ${{ secrets.GE_API_KEY }}
